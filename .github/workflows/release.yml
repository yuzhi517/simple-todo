name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -r server/requirements.txt pyinstaller

      - name: Build
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            pyinstaller --onefile --name "SimpleTodo" --add-data "web;web" --add-data "server;server" run.py
            echo "ASSET=dist/SimpleTodo.exe" >> $GITHUB_ENV
          else
            pyinstaller --onefile --name "SimpleTodo" --add-data "web:web" --add-data "server:server" run.py
            echo "ASSET=dist/SimpleTodo" >> $GITHUB_ENV
          fi
        shell: bash

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.ASSET }}
