name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-13, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install --default-timeout=120 --retries 10 -r server/requirements.txt pyinstaller

      - name: Test
        run: python -m unittest discover -s tests -v

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            pyinstaller --clean --onefile --name "SimpleTodo" --add-data "web;web" --add-data "server;server" run.py
            echo "ASSET=dist/SimpleTodo.exe" >> $GITHUB_ENV
          else
            pyinstaller --clean --onefile --name "SimpleTodo" --add-data "web:web" --add-data "server:server" run.py
            echo "ASSET=dist/SimpleTodo" >> $GITHUB_ENV
          fi

      - name: Smoke test packaged app
        shell: bash
        run: '"${{ env.ASSET }}" --smoke-test'

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.ASSET }}
